name: lebenslauf_und_cokg
description: "Lebenslauf und Co. KG – Meine persönliche CV-Webseite."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.1
  yaml: ^3.1.1
  url_launcher: ^6.2.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  json_annotation: ^4.12.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - data/
    - doc/ich/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.woff2
          weight: 400
        - asset: assets/fonts/Poppins-Medium.woff2
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.woff2
          weight: 600
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato-Regular.woff2
          weight: 400
        - asset: assets/fonts/Lato-Bold.woff2
          weight: 700
